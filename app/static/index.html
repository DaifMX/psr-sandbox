<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSR Sandbox</title>
    <style>
      :root {
        --accent: #5b6cff;
        --accent-dark: #3f4fd6;
        --bg: #f6f7fb;
        --bg-gradient: #eef1ff;
        --card: #ffffff;
        --text: #1a1a2e;
        --muted: #6b7280;
        --badge-bg: #eef0ff;
        --input-border: #d7dae5;
        --card-shadow: rgba(31, 41, 92, 0.12);
      }
      :root[data-theme="dark"] {
        --accent: #7c8bff;
        --accent-dark: #9aa6ff;
        --bg: #12141d;
        --bg-gradient: #1b1f2e;
        --card: #1e2130;
        --text: #e6e8f0;
        --muted: #9aa0b4;
        --badge-bg: #2a2f45;
        --input-border: #3a3f55;
        --card-shadow: rgba(0, 0, 0, 0.45);
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--bg-gradient) 0%, var(--bg) 100%);
        color: var(--text);
        transition: background 0.25s, color 0.25s;
      }
      .card {
        position: relative;
        width: min(92vw, 460px);
        background: var(--card);
        border-radius: 16px;
        padding: 2.5rem 2rem;
        box-shadow: 0 12px 40px var(--card-shadow);
        text-align: center;
        transition: background 0.25s, box-shadow 0.25s;
      }
      .theme-toggle {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 2.25rem;
        height: 2.25rem;
        padding: 0;
        display: grid;
        place-items: center;
        font-size: 1.15rem;
        background: var(--badge-bg);
        color: var(--text);
        border-radius: 50%;
      }
      .theme-toggle:hover {
        background: var(--input-border);
      }
      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.9rem;
        letter-spacing: -0.02em;
      }
      .subtitle {
        margin: 0 0 1.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .badge {
        display: inline-block;
        background: var(--badge-bg);
        color: var(--accent-dark);
        border-radius: 999px;
        padding: 3px 12px;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .controls {
        display: flex;
        gap: 0.5rem;
        margin-top: 1.75rem;
      }
      input {
        flex: 1;
        font-size: 1rem;
        padding: 0.65rem 0.85rem;
        border: 1px solid var(--input-border);
        border-radius: 10px;
        outline: none;
        background: var(--card);
        color: var(--text);
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(91, 108, 255, 0.18);
      }
      button {
        font-size: 1rem;
        font-weight: 600;
        padding: 0.65rem 1.2rem;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: background 0.15s, transform 0.05s;
      }
      button:hover {
        background: var(--accent-dark);
      }
      button:active {
        transform: translateY(1px);
      }
      #greeting {
        margin: 1.5rem 0 0;
        min-height: 1.5rem;
        font-weight: 600;
        color: var(--accent-dark);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
      <h1>PSR Sandbox</h1>
      <p class="subtitle">
        Version <span class="badge" id="version">loading…</span>
      </p>

      <div class="controls">
        <input id="name" type="text" placeholder="your name" value="world" />
        <button id="greet">Greet</button>
      </div>
      <p id="greeting"></p>
    </main>

    <script>
      const themeToggle = document.getElementById("theme-toggle");
      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
      }
      const savedTheme =
        localStorage.getItem("theme") ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light");
      applyTheme(savedTheme);
      themeToggle.addEventListener("click", () => {
        const next =
          document.documentElement.getAttribute("data-theme") === "dark"
            ? "light"
            : "dark";
        localStorage.setItem("theme", next);
        applyTheme(next);
      });

      async function loadVersion() {
        const res = await fetch("/api/version");
        const data = await res.json();
        document.getElementById("version").textContent = data.version;
      }

      async function greet() {
        const name = document.getElementById("name").value || "world";
        const res = await fetch(`/api/hello?name=${encodeURIComponent(name)}`);
        const data = await res.json();
        document.getElementById("greeting").textContent = data.message;
      }

      document.getElementById("greet").addEventListener("click", greet);
      document.getElementById("name").addEventListener("keydown", (e) => {
        if (e.key === "Enter") greet();
      });
      loadVersion();
    </script>
  </body>
</html>
